name: Build and Deploy

on:
  push:
    branches: ["v2"]

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v2
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push multi-arch image
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/bitflow-dhbw/bitflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    runs-on: self-hosted
    needs: build

    steps:
      - name: Pull new image
        run: docker pull ghcr.io/bitflow-dhbw/bitflow:latest

      - name: Restart container
        run: |
          docker compose -f /home/pi-5-server/BitFlow/docker-compose.yml down
          docker compose -f /home/pi-5-server/BitFlow/docker-compose.yml up -d