name: Build and Deploy

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]

permissions:
  contents: read
  packages: write

jobs:
  test:
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup Node.js
        uses: actions/setup-node@v3
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json


      - name: Install dependencies
        run: npm ci

      - name: Complexity threshold
        run: npm run lint:complexity
        continue-on-error: true

      - name: RFC threshold
        run: npm run metrics:rfc
        continue-on-error: true

      - name: Run tests
        run: npm test

      - name: Run tests with coverage
        run: npm run test:coverage

      - name: Coveralls
        uses: coverallsapp/github-action@v2
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          path-to-lcov: ./frontend/coverage/lcov.info

  backend-test:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '8.0.x'

      - name: Restore backend dependencies
        run: dotnet restore backend/BitFlow.API/BitFlow.API.csproj

      - name: Build backend
        run: dotnet build backend/BitFlow.API/BitFlow.API.csproj --configuration Release --no-restore

  build:
    runs-on: ubuntu-latest
    needs:
      - test
      - backend-test

    defaults:
      run:
        working-directory: frontend

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build frontend Docker image for CI
        working-directory: .
        run: docker build -t bitflow:test .

      - name: Build backend Docker image for CI
        working-directory: .
        run: docker build -f backend/BitFlow.API/Dockerfile -t bitflow-backend:test .

      - name: Login to GHCR
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push frontend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v4
        with:
          context: .
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/bitflow-dhbw/bitflow:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push backend image
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        uses: docker/build-push-action@v4
        with:
          context: .
          file: backend/BitFlow.API/Dockerfile
          push: true
          platforms: linux/amd64,linux/arm64
          tags: ghcr.io/bitflow-dhbw/bitflow-backend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  test-deploy:
    runs-on: ubuntu-latest
    needs:
      - test
      - backend-test
      - build

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Build frontend test environment image
        run: docker build -t bitflow:test .

      - name: Build backend test environment image
        run: docker build -f backend/BitFlow.API/Dockerfile -t bitflow-backend:test .

      - name: Create test network
        run: docker network create bitflow-test

      - name: Start backend in test environment
        run: docker run --detach --rm --name bitflow-backend-test --network bitflow-test --network-alias backend bitflow-backend:test

      - name: Start frontend in test environment
        run: docker run --detach --rm --name bitflow-test --network bitflow-test -p 8080:80 bitflow:test

      - name: Check app health
        run: |
          for attempt in {1..30}; do
            if curl --fail --silent --show-error http://localhost:8080/health \
              && curl --fail --silent --show-error http://localhost:8080/api/health; then
              exit 0
            fi
            sleep 2
          done

          docker logs bitflow-test
          docker logs bitflow-backend-test
          exit 1

      - name: Stop test environment
        if: always()
        run: |
          docker stop bitflow-test bitflow-backend-test || true
          docker network rm bitflow-test || true

  deploy:
    runs-on: self-hosted
    needs:
      - test
      - backend-test
      - build
      - test-deploy
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'

    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Update compose file on server
        run: |
          mkdir -p /home/pi-5-server/BitFlow
          cp docker-compose.yml /home/pi-5-server/BitFlow/docker-compose.yml

      - name: Pull new images
        run: docker compose -f /home/pi-5-server/BitFlow/docker-compose.yml pull

      - name: Restart stack
        run: |
          docker compose -f /home/pi-5-server/BitFlow/docker-compose.yml down --remove-orphans
          docker compose -f /home/pi-5-server/BitFlow/docker-compose.yml up -d
