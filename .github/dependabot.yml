version: 2
updates:
  - package-ecosystem: npm
    directory: /frontend
    schedule:
      interval: weekly
    ignore:
      - dependency-name: eslint
        update-types:
          - version-update:semver-major
      - dependency-name: "@eslint/js"
        update-types:
          - version-update:semver-major

  - package-ecosystem: nuget
    directory: /backend/BitFlow.API
    schedule:
      interval: weekly

  - package-ecosystem: docker
    directory: /
    schedule:
      interval: weekly

  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: weekly
